# ashell config

position = "Top"
layer = "Top"

[appearance]
# font_name = "Comic Sans MS"
scale_factor = 1.15
style = "Solid"
# style = "Gradient"
# opacity = 0.9

primary_color = "#74c7ec"
success_color = "#a6e3a1"
warning_color = "#f9e2af"
danger_color = "#f38ba8"
text_color = "#cdd6f4"

workspace_colors = [
  "#89b4fa",
  "#89dceb",
  # "#7aa2f7",
  # "#9ece6a"
]

[appearance.background_color]
base = "#181825"
weak = "#1e1e2e"
strong = "#11111b"

[animations]
enabled = true

[osd]
enabled = true   # Disabled by default; set to true to enable the OSD overlay
timeout = 1500   # Auto-hide delay in milliseconds
show_volume_percentage = true    # Show percentage text next to volume/mic bar
show_brightness_percentage = true # Show percentage text next to brightness bar

[modules]
left = [ ["Launcher", "Workspaces"] ]
center = [ "WindowTitle" ]
right = [ [ "MediaPlayer", "Notifications" ], "Tray", [ "Keyboard", "Settings" ], ["Privacy"], [ "Tempo" ] ]

[workspaces]
workspace_names = ["一","二","三","四","五","六","七","八","九","十"]

[tempo]
clock_format = "%Y-%m-%d %H:%M:%S"
formats = [
  "%H:%M",
  "%Y-%m-%d",
]

[tray]
blocklist = [".*fcitx.*"]

[keyboard_layout.labels]
"English (US)" = "🇺🇸"
"Italian" = "🇮🇹"

[notifications]
blocklist = [".*fcitx.*"]
toast_timeout = 10_000
grouped = true

[media_player]
indicator_format = "Icon"

[[CustomModule]]
name = "Launcher"
icon = "󱗼"
command = "~/.config/rofi/launcher/drun.sh"
