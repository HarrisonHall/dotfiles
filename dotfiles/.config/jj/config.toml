[aliases]
log-bookmark = ["log", "-T", "builtin_log_detailed", "-r", "..@"]
log-all = ["log", "-r", "@ | ancestors(immutable_heads().., 2) | heads(immutable_heads())"]
l = ["log", "-r", "(trunk()..@):: | (trunk()..@)-"]
fresh = ["new", "trunk()"]
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@"]
tug- = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]
mine = ["bookmark", "list", "-r", "mine()"]
pr-log = ["log", "--reversed", "-r", "main..@", "-T", "pr", "-G"]
rad-patch = ["util", "exec", "--", "fish", "-c", """
VISUAL=$EDITOR git push rad HEAD:refs/patches
""", ""]

[ui]
default-command = "log-bookmark"
# default-revset = "@ | ancestors(immutable_heads().., 2) | heads(immutable_heads())"
editor = "hx"
conflict-marker-style = "git"
show-cryptographic-signatures = true

merge-editor = "mergiraf"
diff-formatter = "delta"

[merge-tools.delta]
diff-expected-exit-codes = [0, 1]

[merge-tools.difft]
diff-args = ["--color=always", "$left", "$right"]

# [ui.diff-formatter]
# tool = ["delta"]
# format = "git"

